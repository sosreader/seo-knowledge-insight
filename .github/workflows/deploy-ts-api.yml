name: Deploy TypeScript API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-ts-api.yml"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even if no API changes"
        type: boolean
        default: false

concurrency:
  group: deploy-ts-api
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5
        with:
          package_json_file: api/package.json

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: lambda-bundle
          path: api/dist-lambda/lambda.js
          retention-days: 1

  deploy:
    name: Deploy to Lambda
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: lambda-bundle
          path: dist-lambda/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Package Lambda zip
        run: |
          cd dist-lambda
          echo '{"type":"module"}' > package.json
          zip -j ../lambda.zip lambda.js package.json
          echo "ZIP_SIZE=$(du -h ../lambda.zip | cut -f1)" >> $GITHUB_ENV

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name seo-insight-api \
            --zip-file fileb://lambda.zip \
            --publish \
            --query '{Version:Version,CodeSize:CodeSize}' \
            --output table

          echo "Deployed lambda.zip ($ZIP_SIZE)"

      - name: Verify deployment
        run: |
          FUNC_URL=$(aws lambda get-function-url-config \
            --function-name seo-insight-api \
            --query 'FunctionUrl' --output text)

          for i in 1 2 3 4 5; do
            sleep 3
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${FUNC_URL}health" || true)
            [ "$STATUS" = "200" ] && break
            echo "Attempt $i: got $STATUS, retrying..."
          done

          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (${FUNC_URL}health → 200)"
          else
            echo "WARNING: Health check returned $STATUS after 5 attempts"
          fi
