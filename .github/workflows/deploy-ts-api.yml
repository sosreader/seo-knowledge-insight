name: Deploy TypeScript API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-ts-api.yml"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even if no API changes"
        type: boolean
        default: false

concurrency:
  group: deploy-ts-api
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-bundle
          path: api/dist-lambda/lambda.js
          retention-days: 1

  deploy:
    name: Deploy to Lambda
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lambda-bundle
          path: dist-lambda/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

      - name: Package Lambda zip
        run: |
          cd dist-lambda
          echo '{"type":"module"}' > package.json
          zip -j ../lambda.zip lambda.js package.json
          echo "ZIP_SIZE=$(du -h ../lambda.zip | cut -f1)" >> $GITHUB_ENV

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name seo-insight-api \
            --zip-file fileb://lambda.zip \
            --publish \
            --query '{Version:Version,CodeSize:CodeSize}' \
            --output table

          echo "Deployed lambda.zip ($ZIP_SIZE)"

      - name: Verify deployment
        run: |
          sleep 3
          FUNC_URL=$(aws lambda get-function-url-config \
            --function-name seo-insight-api \
            --query 'FunctionUrl' --output text)

          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${FUNC_URL}health" || true)
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (${FUNC_URL}health → 200)"
          else
            echo "WARNING: Health check returned $STATUS (cold start may take a few seconds)"
          fi
