name: ETL Pipeline + Quality Gate + Deploy

on:
  # 每週一 09:00 UTC 自動執行
  schedule:
    - cron: "0 9 * * 1"
  # 手動觸發
  workflow_dispatch:
    inputs:
      skip_quality_gate:
        description: "Skip quality gate (emergency deploy)"
        type: boolean
        default: false

concurrency:
  group: etl-and-deploy
  cancel-in-progress: false

jobs:
  # ── Job 1: ETL ─────────────────────────────────────────────────────────────
  etl:
    name: ETL Pipeline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch from Notion (incremental)
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/01_fetch_notion.py

      - name: Fetch external articles (Medium + iThome + Google Cases)
        run: python scripts/run_pipeline.py --step fetch-articles
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}

      - name: Extract Q&A (OpenAI)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LMNR_PROJECT_API_KEY: ${{ secrets.LMNR_PROJECT_API_KEY }}
        run: python scripts/02_extract_qa.py

      - name: Deduplicate + Classify
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/03_dedupe_classify.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qa-output
          path: |
            output/qa_final.json
            output/qa_enriched.json
            output/qa_embeddings.npy
          retention-days: 7

  # ── Job 2: Migrate to Supabase ─────────────────────────────────────────────
  migrate:
    name: Migrate to Supabase
    needs: etl
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: qa-output
          path: output/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Migrate to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/migrate_to_supabase.py

  # ── Job 3: Eval + Quality Gate ─────────────────────────────────────────────
  eval:
    name: Eval + Quality Gate
    needs: migrate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: qa-output
          path: output/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data quality eval
        env:
          LMNR_PROJECT_API_KEY: ${{ secrets.LMNR_PROJECT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python scripts/_eval_data_quality.py --source supabase

      - name: Run retrieval eval
        env:
          LMNR_PROJECT_API_KEY: ${{ secrets.LMNR_PROJECT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python scripts/_eval_laminar.py --source supabase --group keyword-retrieval

      - name: Quality Gate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ "${{ inputs.skip_quality_gate }}" = "true" ]; then
            echo "Quality gate skipped (emergency deploy)"
            python scripts/quality_gate.py --source supabase --dry-run
          else
            python scripts/quality_gate.py --source supabase
          fi

  # ── Job 4: Build & Deploy TS API to Lambda ───────────────────────────────
  build-and-deploy:
    name: Build & Deploy to Lambda
    needs: eval
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: api/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Install & Build
        working-directory: api
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Package Lambda zip
        working-directory: api
        run: |
          cd dist-lambda
          echo '{"type":"module"}' > package.json
          zip -j ../lambda.zip lambda.js package.json
          echo "ZIP_SIZE=$(du -h ../lambda.zip | cut -f1)" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

      - name: Deploy to Lambda
        working-directory: api
        run: |
          aws lambda update-function-code \
            --function-name seo-insight-api \
            --zip-file fileb://lambda.zip \
            --publish \
            --query '{Version:Version,CodeSize:CodeSize}' \
            --output table

          echo "Deployed lambda.zip ($ZIP_SIZE) after ETL + quality gate"

      - name: Verify deployment
        run: |
          sleep 3
          FUNC_URL=$(aws lambda get-function-url-config \
            --function-name seo-insight-api \
            --query 'FunctionUrl' --output text)

          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${FUNC_URL}health" || true)
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (${FUNC_URL}health → 200)"
          else
            echo "WARNING: Health check returned $STATUS (cold start may take a few seconds)"
          fi
