name: Deploy SEO Insight API

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "requirements_api.txt"
      - "Dockerfile"
      - ".github/workflows/deploy-seo-api.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-seo-api
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ECR_REPO: seo-insight-api

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          TAG="$(date +%Y%m%d%H%M)-${{ github.run_number }}-${GITHUB_SHA::8}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        timeout-minutes: 20
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ECR_DOMAIN }}/${{ env.ECR_REPO }}:latest
            ${{ secrets.ECR_DOMAIN }}/${{ env.ECR_REPO }}:${{ env.TAG }}
          cache-from: type=registry,ref=${{ secrets.ECR_DOMAIN }}/${{ env.ECR_REPO }}:cache
          cache-to: type=registry,ref=${{ secrets.ECR_DOMAIN }}/${{ env.ECR_REPO }}:cache,mode=max

      - name: Deploy to App Runner
        timeout-minutes: 10
        env:
          SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
        run: |
          set -e

          IMAGE="${{ secrets.ECR_DOMAIN }}/${ECR_REPO}:${TAG}"

          # Build source config JSON safely with jq
          SOURCE_CONFIG=$(jq -n \
            --arg image "$IMAGE" \
            --arg role "${{ secrets.APP_RUNNER_ECR_ROLE_ARN }}" \
            --arg openai "${{ secrets.OPENAI_API_KEY }}" \
            --arg seo "${{ secrets.SEO_API_KEY }}" \
            --arg lmnr "${{ secrets.LMNR_PROJECT_API_KEY }}" \
            '{
              ImageRepository: {
                ImageIdentifier: $image,
                ImageRepositoryType: "ECR",
                ImageConfiguration: {
                  Port: "8001",
                  RuntimeEnvironmentVariables: {
                    OPENAI_API_KEY: $openai,
                    SEO_API_KEY: $seo,
                    LMNR_PROJECT_API_KEY: $lmnr
                  }
                }
              },
              AuthenticationConfiguration: {
                AccessRoleArn: $role
              }
            }')

          echo "Updating App Runner service..."
          OPERATION_ID=$(aws apprunner update-service \
            --service-arn "$SERVICE_ARN" \
            --source-configuration "$SOURCE_CONFIG" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "OperationId" --output text)

          echo "Waiting for operation $OPERATION_ID ..."
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner list-operations \
              --service-arn "$SERVICE_ARN" \
              --region "${{ secrets.AWS_REGION }}" \
              --query "OperationSummaryList[?Id=='${OPERATION_ID}'].Status | [0]" \
              --output text)

            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "Deployment succeeded"
              break
            elif [ "$STATUS" = "FAILED" ]; then
              echo "Deployment FAILED"
              exit 1
            fi
            echo "  Attempt $i/60: $STATUS, retrying in 10s..."
            sleep 10
          done

          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn "$SERVICE_ARN" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Service.ServiceUrl" --output text)

          echo "Deployed $IMAGE to https://$SERVICE_URL"
