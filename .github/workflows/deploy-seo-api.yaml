name: Deploy SEO Insight API

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'requirements_api.txt'
      - 'Dockerfile'
      - '.github/workflows/deploy-seo-api.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-seo-api
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ECR_REPO: seo-insight-api
      PORT: 8001
      CONTAINER_NAME: seo-insight-api

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          TAG="$(date +%Y%m%d%H%M)-${{ github.run_number }}-${GITHUB_SHA::8}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        timeout-minutes: 20
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ECR_DOMAIN }}/${{ env.ECR_REPO }}:latest
            ${{ secrets.ECR_DOMAIN }}/${{ env.ECR_REPO }}:${{ env.TAG }}
          cache-from: type=registry,ref=${{ secrets.ECR_DOMAIN }}/${{ env.ECR_REPO }}:cache
          cache-to: type=registry,ref=${{ secrets.ECR_DOMAIN }}/${{ env.ECR_REPO }}:cache,mode=max

      - name: Deploy to EC2 via SSM
        timeout-minutes: 10
        env:
          ECR_DOMAIN: ${{ secrets.ECR_DOMAIN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # EC2 上存放 qa_final.json / qa_embeddings.npy 的絕對路徑
          OUTPUT_DATA_PATH: ${{ secrets.OUTPUT_DATA_PATH }}
          # EC2 instance tag 篩選（e.g. Environment=seo-api）
          EC2_TAG_KEY: ${{ secrets.EC2_TAG_KEY }}
          EC2_TAG_VALUE: ${{ secrets.EC2_TAG_VALUE }}
        run: |
          set -e

          echo "🔍 Finding EC2 instances..."
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:$EC2_TAG_KEY,Values=$EC2_TAG_VALUE" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text \
            --region "$AWS_REGION")

          if [ -z "$INSTANCE_IDS" ]; then
            echo "❌ No running EC2 found with tag $EC2_TAG_KEY=$EC2_TAG_VALUE"
            exit 1
          fi
          echo "✅ Found: $INSTANCE_IDS"

          IMAGE="${ECR_DOMAIN}/${ECR_REPO}:${TAG}"

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy seo-insight-api:$TAG" \
            --parameters commands="[
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_DOMAIN\",
              \"docker pull $IMAGE\",
              \"docker ps -aq --filter name=$CONTAINER_NAME | grep -q . && docker stop $CONTAINER_NAME && docker rm -f $CONTAINER_NAME || echo 'no running container'\",
              \"docker run -d --name $CONTAINER_NAME --restart always -p 127.0.0.1:$PORT:$PORT -v $OUTPUT_DATA_PATH:/app/output:ro -e OPENAI_API_KEY=$OPENAI_API_KEY $IMAGE\",
              \"docker image prune -a -f || true\",
              \"echo done\"
            ]" \
            --instance-ids $INSTANCE_IDS \
            --region "$AWS_REGION" \
            --query "Command.CommandId" --output text)

          echo "⏳ Waiting for SSM command $COMMAND_ID ..."
          for INSTANCE_ID in $INSTANCE_IDS; do
            for i in $(seq 1 60); do
              STATUS=$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region "$AWS_REGION" \
                --query "Status" --output text 2>/dev/null || echo "Pending")

              if [ "$STATUS" = "Success" ]; then
                echo "✅ Done on $INSTANCE_ID"
                break
              elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
                echo "❌ SSM $STATUS on $INSTANCE_ID"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --region "$AWS_REGION" \
                  --query "StandardErrorContent" --output text 2>/dev/null || true
                exit 1
              fi
              echo "  🔄 Attempt $i/60: $STATUS, retrying in 10s..."
              sleep 10
            done
          done

          echo "🚀 Deployed $IMAGE to $INSTANCE_IDS"
