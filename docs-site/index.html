<!doctype html>
<html lang="en">

      @theme {

        --color-charcoal: #141414;

        --color-gold-light: #F2E8C4;
        --color-champagne: #F2F0E4;

        --font-display: "Marcellus", Georgia, serif;
        --font-body: "Josefin Sans", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }
    </style>
    <link rel="stylesheet" href="./style.css" />

      .scalar-app,
      .scalar-api-reference,

        --scalar-color-2: #888888 !important;
        --scalar-color-3: #666666 !important;
        --scalar-color-accent: #D4AF37 !important;
        --scalar-color-green: #D4AF37 !important;
        --scalar-color-blue: #D4AF37 !important;
        --scalar-color-orange: #D4AF37 !important;
        --scalar-color-red: #888888 !important;
        --scalar-background-1: #0A0A0A !important;
        --scalar-background-2: #141414 !important;
        --scalar-background-3: #1a1a1a !important;
        --scalar-background-accent: #141414 !important;
        --scalar-border-color: rgba(212,175,55,0.15) !important;
        --scalar-radius: 0px !important;
        --scalar-radius-lg: 0px !important;
        --scalar-radius-xl: 0px !important;
        --scalar-shadow-1: 0 0 15px rgba(212,175,55,0.08) !important;
        --scalar-shadow-2: 0 0 25px rgba(212,175,55,0.12) !important;
        --scalar-button-1: #D4AF37 !important;
        --scalar-button-1-color: #0A0A0A !important;
        --scalar-button-1-hover: #F2E8C4 !important;
        --scalar-scrollbar-color: rgba(212,175,55,0.15) !important;
        --scalar-scrollbar-color-active: rgba(212,175,55,0.4) !important;
        font-family: "Josefin Sans", sans-serif !important;
      }
      .scalar-app *, .scalar-api-reference * { border-radius: 0px !important; }
      .scalar-app code, .scalar-app pre,
      .scalar-api-reference code, .scalar-api-reference pre {
        font-family: "JetBrains Mono", monospace !important;
      }
    </style>
  </head>

        <nav class="hidden md:flex items-center">
          <a class="nav-link relative font-body text-[11px] tracking-[0.15em] uppercase text-pewter no-underline px-3.5 py-2 transition-colors duration-300 hover:text-gold focus-visible:outline-2 focus-visible:outline-gold focus-visible:outline-offset-2" href="./guides/introduction.html">Guide</a>

        <div class="hidden md:block w-px h-5 bg-gold/20 mx-1.5"></div>

      data-url="./openapi.json"
      data-configuration='{"theme":"none","darkMode":true,"hideDarkModeToggle":true}'
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@scalar/api-reference@1.25.71/dist/browser/standalone.min.js"
      integrity="sha384-VKMDXzLcsOCCELgb9aQMhET8OCyY6nhRijfF1q7WxI2ooFRBgrWOB/2n8wYLoIFG"
