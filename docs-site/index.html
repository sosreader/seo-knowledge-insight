<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SEO Knowledge Insight API</title>
    <meta
      name="description"
      content="SEO knowledge base API with RAG chat, search, reports, and pipeline management."
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https:; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net;"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Design Tokens ── */
      :root {
        --bg: #FFFFFF;
        --fg: #000000;
        --muted: #F5F5F5;
        --muted-fg: #525252;
        --border: #000000;
        --border-light: #E5E5E5;
        --font-display: "Playfair Display", Georgia, serif;
        --font-body: "Source Serif 4", Georgia, serif;
        --font-mono: "JetBrains Mono", monospace;
      }

      /* ── Reset ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font-body);
        -webkit-font-smoothing: antialiased;
      }

      /* ── Noise texture for paper quality ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        opacity: 0.018;
      }

      /* ── Site Header ── */
      .site-header {
        position: sticky;
        top: 0;
        z-index: 200;
        background: var(--bg);
        border-bottom: 4px solid var(--fg);
      }

      .header-inner {
        max-width: 1152px;
        margin: 0 auto;
        padding: 0 24px;
        height: 64px;
        display: flex;
        align-items: center;
        gap: 0;
      }

      /* ── Brand ── */
      .brand {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-right: auto;
        text-decoration: none;
        color: var(--fg);
      }

      .brand-name {
        font-family: var(--font-display);
        font-size: 20px;
        font-weight: 400;
        letter-spacing: -0.03em;
        line-height: 1;
      }

      .brand-name em {
        font-style: italic;
      }

      .brand-tag {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.05em;
        color: var(--fg);
        border: 1px solid var(--fg);
        padding: 2px 8px;
        line-height: 1;
      }

      /* ── Nav ── */
      .nav-links {
        display: flex;
        align-items: center;
        gap: 0;
      }

      .nav-links a {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted-fg);
        text-decoration: none;
        padding: 8px 16px;
        transition: color 100ms;
        position: relative;
      }

      .nav-links a::after {
        content: "";
        position: absolute;
        bottom: 4px;
        left: 16px;
        right: 16px;
        height: 1px;
        background: var(--fg);
        transform: scaleX(0);
        transition: transform 100ms;
      }

      .nav-links a:hover {
        color: var(--fg);
      }

      .nav-links a:hover::after {
        transform: scaleX(1);
      }

      .nav-links a:focus-visible {
        outline: 3px solid var(--fg);
        outline-offset: 2px;
      }

      /* ── Divider ── */
      .nav-sep {
        width: 1px;
        height: 24px;
        background: var(--border-light);
        margin: 0 8px;
      }

      /* ── GitHub icon ── */
      .github-link {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        color: var(--muted-fg);
        transition: color 100ms;
      }

      .github-link:hover {
        color: var(--fg);
      }

      .github-link:focus-visible {
        outline: 3px solid var(--fg);
        outline-offset: 2px;
      }

      .github-link svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      /* ── Mobile ── */
      @media (max-width: 768px) {
        .nav-links { display: none; }
        .nav-sep { display: none; }
        .header-inner { height: 56px; }
        .brand-name { font-size: 18px; }
      }

      /* ── Scalar Monochrome Overrides ── */
      .scalar-app,
      .scalar-api-reference,
      [id="api-reference"] ~ div {
        --scalar-color-1: #000000 !important;
        --scalar-color-2: #525252 !important;
        --scalar-color-3: #737373 !important;
        --scalar-color-accent: #000000 !important;
        --scalar-color-green: #000000 !important;
        --scalar-color-blue: #000000 !important;
        --scalar-color-orange: #525252 !important;
        --scalar-color-red: #525252 !important;
        --scalar-background-1: #FFFFFF !important;
        --scalar-background-2: #F5F5F5 !important;
        --scalar-background-3: #E5E5E5 !important;
        --scalar-background-accent: #F5F5F5 !important;
        --scalar-border-color: #E5E5E5 !important;
        --scalar-radius: 0px !important;
        --scalar-radius-lg: 0px !important;
        --scalar-radius-xl: 0px !important;
        --scalar-shadow-1: none !important;
        --scalar-shadow-2: none !important;
        --scalar-button-1: #000000 !important;
        --scalar-button-1-color: #FFFFFF !important;
        --scalar-button-1-hover: #525252 !important;
        --scalar-scrollbar-color: #E5E5E5 !important;
        --scalar-scrollbar-color-active: #525252 !important;
        font-family: "Source Serif 4", Georgia, serif !important;
      }

      /* Force sharp corners on all Scalar elements */
      .scalar-app *,
      .scalar-api-reference * {
        border-radius: 0px !important;
      }

      /* Force monochrome on Scalar sidebar active states */
      .scalar-app .sidebar-heading.active,
      .scalar-app [class*="active"] {
        color: #000000 !important;
      }

      /* Override Scalar code blocks to use JetBrains Mono */
      .scalar-app code,
      .scalar-app pre,
      .scalar-api-reference code,
      .scalar-api-reference pre {
        font-family: "JetBrains Mono", monospace !important;
        border-radius: 0px !important;
      }

      /* Override method badges to be monochrome */
      .scalar-app [class*="method"],
      .scalar-app [class*="badge"] {
        border-radius: 0px !important;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="./">
          <span class="brand-name">SEO Knowledge <em>Insight</em></span>
          <span class="brand-tag">API v3.4</span>
        </a>
        <nav class="nav-links">
          <a href="./guides/introduction.md">Guide</a>
          <a href="./guides/quickstart.md">Quick Start</a>
          <a href="./guides/search-and-chat.md">Search &amp; Chat</a>
          <a href="./guides/api-overview.md">Overview</a>
        </nav>
        <div class="nav-sep"></div>
        <a
          class="github-link"
          href="https://github.com/sosreader/seo-knowledge-insight"
          target="_blank"
          rel="noopener noreferrer"
          title="GitHub"
        >
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
          </svg>
        </a>
      </div>
    </header>
    <script
      id="api-reference"
      data-url="./openapi.json"
      data-configuration='{"theme":"default","darkMode":false,"hideDarkModeToggle":true}'
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@scalar/api-reference@1.25.71/dist/browser/standalone.min.js"
      integrity="sha384-VKMDXzLcsOCCELgb9aQMhET8OCyY6nhRijfF1q7WxI2ooFRBgrWOB/2n8wYLoIFG"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
